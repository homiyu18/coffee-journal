<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Coffee Journal">
<title>Coffee Journal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f5f3ef;color:#1a1a18;font-size:16px;padding-bottom:40px}
.header{background:#fff;border-bottom:0.5px solid #e0ded8;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.header-icon{font-size:22px}
.header-title{font-size:17px;font-weight:600}
.header-sub{font-size:12px;color:#888}
.tabs{display:flex;background:#fff;border-bottom:0.5px solid #e0ded8;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:10px 14px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.tab.active{color:#1a1a18;border-bottom:2px solid #1a1a18}
.section{display:none;padding:16px}.section.active{display:block}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;border:0.5px solid #e8e6e0}
label{display:block;font-size:13px;color:#666;margin-bottom:5px;margin-top:14px}
label:first-child{margin-top:0}
input,select,textarea{width:100%;font-size:15px;padding:10px 12px;border:0.5px solid #d8d6d0;border-radius:8px;background:#fff;color:#1a1a18;appearance:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:#888}
input:read-only{background:#f5f3ef;color:#888}
textarea{height:68px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.unit-wrap{position:relative}
.unit-wrap input{padding-right:32px}
.unit{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;color:#aaa;pointer-events:none}
.stars{display:flex;gap:6px;margin:6px 0}
.star{font-size:28px;cursor:pointer;color:#ddd;-webkit-tap-highlight-color:transparent}
.star.on{color:#BA7517}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border:0.5px solid #ccc;border-radius:8px;font-size:15px;cursor:pointer;background:#fff;color:#1a1a18;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.7}
.btn:disabled{opacity:.4;cursor:default}
.btn-primary{background:#1a1a18;color:#fff;border-color:#1a1a18}
.btn-primary:hover{opacity:.85}
.btn-sm{padding:6px 12px;font-size:13px}
.sub-section{border:0.5px solid #e0ded8;border-radius:8px;padding:12px;margin-top:14px;background:#f9f8f5}
.sub-title{font-size:12px;font-weight:600;margin-bottom:8px;color:#666}
.pour-row{display:grid;grid-template-columns:64px 1fr 1fr 28px;gap:8px;align-items:center;margin-bottom:8px}
.pour-label{font-size:13px;color:#666}
.pour-del{background:none;border:none;cursor:pointer;color:#bbb;font-size:18px;padding:0}
.tag{display:inline-block;font-size:12px;padding:3px 9px;border-radius:99px;margin-right:4px;margin-bottom:4px}
.tag-method{background:#FAEEDA;color:#854F0B}
.tag-origin{background:#E1F5EE;color:#0F6E56}
.tag-roast{background:#EEEDFE;color:#3C3489}
.tag-milk{background:#E6F1FB;color:#185FA5}
.tag-ice{background:#E0F4FF;color:#0B5FA5}
.age-pill{display:inline-block;font-size:12px;padding:2px 10px;border-radius:99px;margin-left:6px}
.age-early{background:#FAEEDA;color:#854F0B}
.age-peak{background:#E1F5EE;color:#0F6E56}
.age-late{background:#FCEBEB;color:#A32D2D}
.score{font-size:18px;font-weight:600;color:#BA7517}
.entry-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.entry-title{font-size:15px;font-weight:600}
.entry-date{font-size:12px;color:#aaa;margin-top:2px}
.del-btn{font-size:12px;color:#bbb;cursor:pointer;border:none;background:none;padding:4px 6px}
.pour-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;margin-top:8px}
.pour-item{background:#f5f3ef;border-radius:8px;padding:6px 8px;font-size:12px}
.pour-item-lbl{color:#888;font-size:11px;margin-bottom:2px}
.insight-stat{background:#f5f3ef;border-radius:8px;padding:12px}
.insight-lbl{font-size:12px;color:#888;margin-bottom:4px}
.insight-val{font-size:20px;font-weight:600}
.insight-sub{font-size:12px;color:#888;margin-top:2px}
.bar-wrap{margin:8px 0}
.bar-lbl{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.bar-bg{height:8px;background:#ece9e3;border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;background:#BA7517;transition:width .4s}
.empty{text-align:center;padding:2.5rem 1rem;color:#aaa;font-size:14px;line-height:1.7}
.bean-select-info{background:#f5f3ef;border-radius:8px;padding:10px 12px;margin-top:8px;font-size:13px;color:#666;display:none}
.divider{border:none;border-top:0.5px solid #ece9e3;margin:16px 0}
.section-heading{font-size:14px;font-weight:600;margin-bottom:12px}
.calc-result{background:#f0fff4;border:0.5px solid #86efac;border-radius:8px;padding:8px 12px;margin-top:8px;font-size:13px;color:#166534;display:none}
.fixed-badge{display:inline-block;font-size:12px;padding:2px 8px;border-radius:4px;background:#f5f3ef;color:#888;margin-left:6px;vertical-align:middle}
.dripper-list{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.dripper-option{display:flex;align-items:center;gap:10px;padding:9px 12px;border:0.5px solid #d8d6d0;border-radius:8px;cursor:pointer;background:#fff;transition:border-color .15s,background .15s}
.dripper-option:active{background:#f5f3ef}
.dripper-option.selected{border-color:#1a1a18;background:#f9f8f5}
.dripper-option input[type=radio]{width:16px;height:16px;flex-shrink:0;accent-color:#1a1a18;margin:0;padding:0;border:none}
.dripper-name{font-size:14px;color:#1a1a18}
.tag-dripper{background:#F0EDE8;color:#5C4A2A}
.bean-status-toggle{display:flex;gap:6px;margin-top:10px}
.status-btn{flex:1;padding:7px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid #d8d6d0;background:#fff;color:#888;text-align:center}
.status-btn.active-status{background:#E1F5EE;border-color:#0F6E56;color:#0F6E56}
.status-btn.inactive-status{background:#f5f3ef;border-color:#ccc;color:#bbb}
.bean-card-inactive{opacity:.5}
.bean-section-label{font-size:11px;font-weight:600;color:#aaa;padding:8px 0 4px;letter-spacing:.05em}
.tasting-row{margin-bottom:12px}
.tasting-row:last-child{margin-bottom:0}
.tasting-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.tasting-label{font-size:13px;font-weight:500;color:#1a1a18}
.tasting-en{font-size:11px;color:#aaa;margin-left:4px}
.tasting-val{font-size:13px;font-weight:600;color:#BA7517;min-width:16px;text-align:right}
input[type=range]{width:100%;height:4px;border-radius:99px;background:#ddd;border:none;padding:0;accent-color:#BA7517;cursor:pointer;-webkit-appearance:none;appearance:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#BA7517;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tasting-desc{font-size:11px;color:#aaa;margin-top:3px}
.flavor-section{margin-top:14px;border:0.5px solid #e0ded8;border-radius:8px;padding:12px;background:#f9f8f5}
.flavor-category{margin-bottom:10px}
.flavor-category:last-child{margin-bottom:0}
.flavor-cat-label{font-size:11px;font-weight:600;color:#888;margin-bottom:6px}
.flavor-chips{display:flex;flex-wrap:wrap;gap:6px}
.flavor-chip{display:inline-flex;align-items:center;padding:5px 10px;border-radius:99px;font-size:13px;cursor:pointer;border:0.5px solid #d8d6d0;background:#fff;color:#1a1a18;-webkit-tap-highlight-color:transparent;transition:all .15s;user-select:none}
.flavor-chip.selected{border-color:transparent;color:#fff;font-weight:500}
.flavor-chip.cat-fruit.selected{background:#E85D3A}
.flavor-chip.cat-floral.selected{background:#B85CB8}
.flavor-chip.cat-choco.selected{background:#7B4B2A}
.flavor-chip.cat-roast.selected{background:#4A3728}
.flavor-chip.cat-sweet.selected{background:#C4870A}
.flavor-chip.cat-spice.selected{background:#A03A1A}
.flavor-tag{display:inline-block;font-size:12px;padding:2px 8px;border-radius:99px;margin-right:4px;margin-bottom:4px;color:#fff}
.ftag-fruit{background:#E85D3A}
.ftag-floral{background:#B85CB8}
.ftag-choco{background:#7B4B2A}
.ftag-roast{background:#4A3728}
.ftag-sweet{background:#C4870A}
.ftag-spice{background:#A03A1A}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">☕</div>
  <div>
    <div class="header-title">Coffee Journal</div>
    <div class="header-sub">自分だけのコーヒー記録帳</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('record')">記録する</button>
  <button class="tab" onclick="showTab('beans')">豆マスタ</button>
  <button class="tab" onclick="showTab('history')">履歴</button>
  <button class="tab" onclick="showTab('insights')">傾向・示唆</button>
</div>

<!-- 記録する -->
<div id="record" class="section active">
  <div class="card">

    <!-- 種類 -->
    <div>
      <label>種類</label>
      <select id="f-type" onchange="onTypeChange()">
        <option>（HOT）ドリップコーヒー</option>
        <option>（ICE）ドリップコーヒー</option>
        <option>カフェラテ</option>
        <option>エスプレッソ</option>
        <option>コールドブリュー</option>
      </select>
    </div>

    <!-- 抽出方法 -->
    <div>
      <label>抽出方法 <span id="method-fixed-badge" class="fixed-badge" style="display:none">エスプレッソマシン固定</span></label>
      <select id="f-method" onchange="onMethodChange()">
        <option>ハンドドリップ</option>
        <option>エスプレッソマシン</option>
        <option>フレンチプレス</option>
        <option>エアロプレス</option>
        <option>モカポット</option>
        <option>カプセル</option>
        <option>その他</option>
      </select>
    </div>

    <!-- 豆を選ぶ -->
    <div>
      <label>使用する豆</label>
      <select id="f-bean" onchange="onBeanSelect()">
        <option value="">— 豆を選択（または手入力）—</option>
      </select>
      <div id="bean-info" class="bean-select-info"></div>
    </div>

    <!-- 産地・焙煎度 -->
    <div class="row2" style="margin-top:0">
      <div>
        <label>豆の産地</label>
        <input id="f-origin" type="text" placeholder="例: エチオピア">
      </div>
      <div>
        <label>焙煎度</label>
        <select id="f-roast">
          <option>浅煎り</option><option>中煎り</option>
          <option>深煎り</option>
        </select>
      </div>
    </div>

    <!-- 豆の量・湯温 -->
    <div class="row2">
      <div>
        <label>豆の量</label>
        <div class="unit-wrap"><input id="f-dose" type="number" inputmode="decimal" placeholder="15"><span class="unit">g</span></div>
      </div>
      <div>
        <label>湯温</label>
        <div class="unit-wrap"><input id="f-temp" type="number" inputmode="decimal" placeholder="92"><span class="unit">°C</span></div>
      </div>
    </div>

    <!-- ICEドリップ：氷の量 -->
    <div id="ice-section" class="sub-section" style="display:none;border-color:#BDE4F4">
      <div class="sub-title" style="color:#0B5FA5">氷の量</div>
      <div class="unit-wrap" style="max-width:160px">
        <input id="f-ice" type="number" inputmode="decimal" placeholder="例: 100" style="padding-right:32px">
        <span class="unit">g</span>
      </div>
    </div>

    <!-- ドリップ：器具選択 -->
    <div id="dripper-section" class="sub-section" style="display:none;border-color:#D8CFC4">
      <div class="sub-title" style="color:#5C4A2A">使用した器具</div>
      <div class="dripper-list" id="dripper-list"></div>
    </div>

    <!-- ドリップ：投入記録 (HOT/ICE) -->
    <div id="pour-section" class="sub-section">
      <div class="sub-title" style="color:#0F6E56">お湯の投入記録</div>
      <div id="pour-rows"></div>
      <div style="display:flex;gap:8px;margin-top:4px;align-items:center">
        <button class="btn btn-sm" onclick="addPour()">＋ 投入を追加</button>
        <span id="pour-total" style="font-size:12px;color:#888"></span>
      </div>
    </div>

    <!-- コールドブリュー：水の量 + 抽出時刻 -->
    <div id="coldbrew-section" class="sub-section" style="display:none;border-color:#C5D8F4">
      <div class="sub-title" style="color:#1A4F8A">コールドブリュー</div>
      <div class="row2">
        <div>
          <label>水の量</label>
          <div class="unit-wrap"><input id="f-cb-water" type="number" inputmode="decimal" placeholder="例: 500"><span class="unit">ml</span></div>
        </div>
        <div></div>
      </div>
      <div class="row2" style="margin-top:10px">
        <div>
          <label>抽出開始時刻</label>
          <input id="f-cb-start" type="time" oninput="calcBrewTime()">
        </div>
        <div>
          <label>抽出終了時刻</label>
          <input id="f-cb-end" type="time" oninput="calcBrewTime()">
        </div>
      </div>
      <div id="cb-calc" class="calc-result"></div>
    </div>

    <!-- ミルク (カフェラテ) -->
    <div id="milk-section" class="sub-section" style="display:none;border-color:#B5D4F4">
      <div class="sub-title" style="color:#185FA5">ミルク情報</div>
      <div class="row2">
        <div>
          <label>ミルクの量</label>
          <div class="unit-wrap"><input id="f-milk" type="number" inputmode="decimal" placeholder="150"><span class="unit">ml</span></div>
        </div>
        <div>
          <label>フォーム時間</label>
          <div class="unit-wrap"><input id="f-foam" type="number" inputmode="decimal" placeholder="30"><span class="unit">秒</span></div>
        </div>
      </div>
    </div>

    <hr class="divider">

    <!-- 総合評価 -->
    <div>
      <label>総合評価</label>
      <div class="stars" id="stars">
        <span class="star" data-v="1">★</span><span class="star" data-v="2">★</span>
        <span class="star" data-v="3">★</span><span class="star" data-v="4">★</span>
        <span class="star" data-v="5">★</span>
      </div>
    </div>

    <!-- 5つのテイスティング評価 -->
    <div style="margin-top:14px;border:0.5px solid #e0ded8;border-radius:8px;padding:12px;background:#f9f8f5">
      <div style="font-size:12px;font-weight:600;color:#666;margin-bottom:10px">テイスティング評価</div>
      <div id="tasting-sliders"></div>
    </div>
    <!-- フレーバー選択 -->
    <div class="flavor-section">
      <div style="font-size:12px;font-weight:600;color:#666;margin-bottom:10px">どんな味に近かった？（複数選択可）</div>
      <div id="flavor-chips"></div>
    </div>

    <div>
      <label>メモ（香り・後味など）</label>
      <textarea id="f-note" placeholder="例: チョコレートのような甘い香り、後味がすっきり..."></textarea>
    </div>
    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn btn-primary" onclick="saveEntry()">記録を保存</button>
      <button class="btn" onclick="clearRecordForm()">クリア</button>
    </div>
  </div>
</div>

<!-- 豆マスタ -->
<div id="beans" class="section">
  <div class="card">
    <div class="section-heading">新しい豆を登録</div>
    <div class="row2">
      <div>
        <label>豆の名前 <span style="color:#e24b4a">*</span></label>
        <input id="b-name" type="text" placeholder="例: エチオピア イルガチェフェ">
      </div>
      <div>
        <label>焙煎日 <span style="color:#e24b4a">*</span></label>
        <input id="b-roastdate" type="date">
      </div>
    </div>
    <div class="row2">
      <div><label>産地</label><input id="b-origin" type="text" placeholder="例: エチオピア"></div>
      <div><label>焙煎度</label>
        <select id="b-roast">
          <option>浅煎り</option><option>中煎り</option>
          <option>深煎り</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div><label>品種（任意）</label><input id="b-variety" type="text" placeholder="例: ゲイシャ"></div>
      <div><label>購入ショップ（任意）</label><input id="b-shop" type="text" placeholder="例: ○○コーヒー"></div>
    </div>
    <div>
      <label>精製方法（任意）</label>
      <select id="b-process">
        <option value="">— 選択してください —</option>
        <option>ウォッシュド プロセス（フリーウォッシュド）</option>
        <option>パルプドナチュラル プロセス（ハニープロセス）</option>
        <option>ナチュラル（乾燥式）</option>
        <option>スマトラ式</option>
      </select>
    </div>
    <div><label>メモ（任意）</label><input id="b-note" type="text" placeholder="例: フルーティで華やかな香り"></div>
    <div>
      <label>ステータス</label>
      <div class="bean-status-toggle">
        <button class="status-btn active-status" id="b-status-active" onclick="setBeanStatus('active')">✓ 使用中</button>
        <button class="status-btn" id="b-status-inactive" onclick="setBeanStatus('inactive')">使い切り</button>
      </div>
    </div>
    <div style="margin-top:16px"><button class="btn btn-primary" onclick="saveBean()">豆を登録</button></div>
  </div>
  <div id="bean-list"></div>
</div>

<!-- 履歴 -->
<div id="history" class="section"><div id="history-list"></div></div>

<!-- 示唆 -->
<div id="insights" class="section"><div id="insights-content"></div></div>

<script>
const POUR_LABELS=['蒸らし','1回目','2回目','3回目','4回目','5回目','6回目'];
const DRIP_TYPES=['（HOT）ドリップコーヒー','（ICE）ドリップコーヒー'];
const DRIPPERS=[
  'HARIO V60 透過ドリッパー 01',
  'HARIO V60 陶器ドリッパー 02',
  'Kalita 102-ロト（ブラウン）',
  'Kalita 101-D（透過）',
  'ブルーボトルコーヒー ドリッパー'
];
let rating=0, pours=[{water:'',time:''}], selectedDripper='';
let beanStatusInput='active';

function setBeanStatus(s){
  beanStatusInput=s;
  document.getElementById('b-status-active').className='status-btn'+(s==='active'?' active-status':'');
  document.getElementById('b-status-inactive').className='status-btn'+(s==='inactive'?' active-status':'');
}

function renderDripperList(){
  document.getElementById('dripper-list').innerHTML=DRIPPERS.map((d,i)=>`
    <label class="dripper-option${selectedDripper===d?' selected':''}" onclick="selectDripper('${d.replace(/'/g,"\\'")}',this)">
      <input type="radio" name="dripper" value="${d}"${selectedDripper===d?' checked':''}>
      <span class="dripper-name">${d}</span>
    </label>`).join('');
}
function selectDripper(name, el){
  selectedDripper=name;
  document.querySelectorAll('.dripper-option').forEach(e=>e.classList.remove('selected'));
  if(el)el.classList.add('selected');
}

const FLAVOR_CATEGORIES=[
  {id:'fruit', label:'🍋 フルーツ系', items:['シトラス（レモン・オレンジ）','ベリー（いちご・ブルーベリー）','ドライフルーツ（レーズン・プルーン）','アップル・ピーチ','トロピカル（マンゴー・パイナップル）']},
  {id:'floral', label:'🌸 フローラル系', items:['ジャスミン','ローズ','ハーブ']},
  {id:'choco', label:'🍫 チョコレート・ナッツ系', items:['ビターチョコ','ミルクチョコ','キャラメル','アーモンド','ヘーゼルナッツ']},
  {id:'roast', label:'🌾 ロースト・穀物系', items:['スモーキー','トースト','麦・シリアル']},
  {id:'sweet', label:'🍯 甘み系', items:['はちみつ','バニラ','ブラウンシュガー','メープル']},
  {id:'spice', label:'🌶 スパイス系', items:['シナモン','クローブ','黒胡椒']},
];
let selectedFlavors=new Set();

function renderFlavorChips(){
  document.getElementById('flavor-chips').innerHTML=FLAVOR_CATEGORIES.map(cat=>`
    <div class="flavor-category">
      <div class="flavor-cat-label">${cat.label}</div>
      <div class="flavor-chips">
        ${cat.items.map(item=>`

// ---- age helpers ----
function daysFromRoast(d){if(!d)return null;return Math.floor((Date.now()-new Date(d).getTime())/86400000)}
function agePill(days){
  if(days===null)return'';
  if(days<7)return`<span class="age-pill age-early">焙煎${days}日目・ガス抜き中</span>`;
  if(days<=30)return`<span class="age-pill age-peak">焙煎${days}日目・ピーク</span>`;
  return`<span class="age-pill age-late">焙煎${days}日目・注意</span>`;
}

// ---- brew time calc (coldbrew) ----
function calcBrewTime(){
  const s=document.getElementById('f-cb-start').value;
  const e=document.getElementById('f-cb-end').value;
  const el=document.getElementById('cb-calc');
  if(!s||!e){el.style.display='none';return;}
  const [sh,sm]=s.split(':').map(Number);
  const [eh,em]=e.split(':').map(Number);
  let totalMin=(eh*60+em)-(sh*60+sm);
  if(totalMin<0)totalMin+=24*60; // 日またぎ対応
  const h=Math.floor(totalMin/60), m=totalMin%60;
  el.textContent=`抽出時間: ${h}時間${m}分`;
  el.style.display='block';
}

// ---- pour total time ----
function updatePourTotal(){
  const totalMl=pours.reduce((s,p)=>s+(parseFloat(p.water)||0),0);
  const totalSec=pours.reduce((s,p)=>s+(parseFloat(p.time)||0),0);
  const parts=[];
  if(totalMl>0)parts.push(`合計 ${totalMl} ml`);
  if(totalSec>0){
    const m=Math.floor(totalSec/60),s=totalSec%60;
    parts.push(`経過 ${m>0?m+'分':''}${s>0?s+'秒':''}`);
  }
  document.getElementById('pour-total').textContent=parts.join(' / ');
}

// ---- save entry ----
function saveEntry(){
  const type=document.getElementById('f-type').value;
  const isDrip=DRIP_TYPES.includes(type);
  const isIce=type==='（ICE）ドリップコーヒー';
  const isLatte=type==='カフェラテ';
  const isCold=type==='コールドブリュー';

  const beanId=document.getElementById('f-bean').value||null;
  const bean=beanId?getBeans().find(b=>b.id==beanId):null;
  const days=bean?daysFromRoast(bean.roastDate):null;

  // コールドブリュー抽出時間
  let cbStart='',cbEnd='',cbDuration='';
  if(isCold){
    cbStart=document.getElementById('f-cb-start').value;
    cbEnd=document.getElementById('f-cb-end').value;
    if(cbStart&&cbEnd){
      const [sh,sm]=cbStart.split(':').map(Number);
      const [eh,em]=cbEnd.split(':').map(Number);
      let totalMin=(eh*60+em)-(sh*60+sm);
      if(totalMin<0)totalMin+=24*60;
      const h=Math.floor(totalMin/60),m=totalMin%60;
      cbDuration=`${h}時間${m}分`;
    }
  }

  const entry={
    id:Date.now(),
    date:new Date().toLocaleDateString('ja-JP'),
    type,
    method:document.getElementById('f-method').value,
    beanId,beanName:bean?bean.name:'',
    origin:document.getElementById('f-origin').value.trim()||(bean?bean.origin:'')||'不明',
    roast:document.getElementById('f-roast').value,
    roastDate:bean?bean.roastDate:'',daysFromRoast:days,
    dose:document.getElementById('f-dose').value,
    temp:document.getElementById('f-temp').value,
    dripper:isDrip&&document.getElementById('f-method').value==='ハンドドリップ'?selectedDripper:'',
    pours:isDrip?pours.filter(p=>p.water||p.time).map((p,i)=>({label:POUR_LABELS[i],water:p.water,time:p.time})):[],
    ice:isIce?document.getElementById('f-ice').value:'',
    cbWater:isCold?document.getElementById('f-cb-water').value:'',
    cbStart,cbEnd,cbDuration,
    milk:isLatte?document.getElementById('f-milk').value:'',
    foam:isLatte?document.getElementById('f-foam').value:'',
    rating,
    tasting:{...tastingValues},
    flavors:[...selectedFlavors],
    note:document.getElementById('f-note').value.trim()
  };
  if(!rating){alert('評価（★）を選んでください');return;}
  const arr=getLogs();arr.unshift(entry);saveLogs(arr);
  clearRecordForm();
  const btn=document.querySelector('#record .btn-primary');
  btn.textContent='保存しました！';btn.disabled=true;
  setTimeout(()=>{btn.textContent='記録を保存';btn.disabled=false;},1500);
}

// ---- insights ----
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0;}
function renderInsights(){
  const arr=getLogs();
  const el=document.getElementById('insights-content');
  if(arr.length<2){el.innerHTML='<div class="empty">示唆を出すには2件以上の記録が必要です。<br>もう少し記録してみましょう！</div>';return;}
  const byType={},byMethod={},byOrigin={},byRoast={},byAge=[];
  arr.forEach(e=>{
    (byType[e.type]=byType[e.type]||[]).push(e.rating);
    (byMethod[e.method]=byMethod[e.method]||[]).push(e.rating);
    if(e.origin!=='不明')(byOrigin[e.origin]=byOrigin[e.origin]||[]).push(e.rating);
    (byRoast[e.roast]=byRoast[e.roast]||[]).push(e.rating);
    if(e.daysFromRoast!=null)byAge.push({days:e.daysFromRoast,rating:e.rating});
  });
  const topMethod=Object.entries(byMethod).sort((a,b)=>avg(b[1])-avg(a[1]))[0];
  const topOrigin=Object.entries(byOrigin).sort((a,b)=>avg(b[1])-avg(a[1]))[0];
  const totalAvg=avg(arr.map(e=>e.rating));
  function barChart(obj,title){
    const entries=Object.entries(obj).map(([k,v])=>({k,a:avg(v),n:v.length})).sort((a,b)=>b.a-a.a);
    const max=Math.max(...entries.map(e=>e.a));
    return`<div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:12px">${title}</div>
      ${entries.map(e=>`<div class="bar-wrap">
        <div class="bar-lbl"><span>${e.k} <span style="color:#aaa;font-size:12px">(${e.n}件)</span></span><span style="font-weight:600">${e.a.toFixed(1)}★</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${max>0?(e.a/max*100).toFixed(0):0}%"></div></div>
      </div>`).join('')}</div>`;
  }
  let ageChart='';
  if(byAge.length>=2){
    const groups=[
      {k:'7日未満（ガス抜き中）',v:byAge.filter(x=>x.days<7).map(x=>x.rating)},
      {k:'7〜30日（ピーク期）',v:byAge.filter(x=>x.days>=7&&x.days<=30).map(x=>x.rating)},
      {k:'30日以降（劣化注意）',v:byAge.filter(x=>x.days>30).map(x=>x.rating)}
    ].filter(d=>d.v.length>0);
    if(groups.length>=2){
      const max=Math.max(...groups.map(d=>avg(d.v)));
      ageChart=`<div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:12px">焙煎経過日数 vs 評価</div>
        ${groups.map(d=>`<div class="bar-wrap">
          <div class="bar-lbl"><span>${d.k} <span style="color:#aaa;font-size:12px">(${d.v.length}件)</span></span><span style="font-weight:600">${avg(d.v).toFixed(1)}★</span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:${max>0?(avg(d.v)/max*100).toFixed(0):0}%"></div></div>
        </div>`).join('')}</div>`;
    }
  }
  el.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div class="insight-stat"><div class="insight-lbl">平均評価</div><div class="insight-val">${totalAvg.toFixed(1)}★</div><div class="insight-sub">${arr.length}件の記録</div></div>
      ${topMethod?`<div class="insight-stat"><div class="insight-lbl">ベスト抽出法</div><div class="insight-val" style="font-size:15px">${topMethod[0]}</div><div class="insight-sub">平均 ${avg(topMethod[1]).toFixed(1)}★</div></div>`:''}
      ${topOrigin?`<div class="insight-stat"><div class="insight-lbl">ベスト産地</div><div class="insight-val" style="font-size:15px">${topOrigin[0]}</div><div class="insight-sub">平均 ${avg(topOrigin[1]).toFixed(1)}★</div></div>`:''}
    </div>
    ${ageChart}
    ${Object.keys(byType).length>1?barChart(byType,'種類別 平均評価'):''}
    ${barChart(byMethod,'抽出方法別 平均評価')}
    ${Object.keys(byOrigin).length>0?barChart(byOrigin,'産地別 平均評価'):''}
    ${barChart(byRoast,'焙煎度別 平均評価')}`;
}

// ---- init ----
populateBeanSelect();
initPours();
renderTastingSliders();
renderFlavorChips();
</script>
