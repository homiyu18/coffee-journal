<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Coffee Journal">
<title>Coffee Journal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f5f3ef;color:#1a1a18;font-size:16px;padding-bottom:40px}
.header{background:#fff;border-bottom:0.5px solid #e0ded8;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.header-icon{font-size:22px}
.header-title{font-size:17px;font-weight:600}
.header-sub{font-size:12px;color:#888}
.tabs{display:flex;background:#fff;border-bottom:0.5px solid #e0ded8;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:10px 14px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.tab.active{color:#1a1a18;border-bottom:2px solid #1a1a18}
.section{display:none;padding:16px}.section.active{display:block}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;border:0.5px solid #e8e6e0}
label{display:block;font-size:13px;color:#666;margin-bottom:5px;margin-top:14px}
label:first-child{margin-top:0}
input,select,textarea{width:100%;font-size:15px;padding:10px 12px;border:0.5px solid #d8d6d0;border-radius:8px;background:#fff;color:#1a1a18;appearance:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:#888}
textarea{height:72px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.unit-wrap{position:relative}
.unit-wrap input{padding-right:32px}
.unit{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;color:#aaa;pointer-events:none}
.stars{display:flex;gap:6px;margin:6px 0}
.star{font-size:28px;cursor:pointer;color:#ddd;-webkit-tap-highlight-color:transparent}
.star.on{color:#BA7517}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border:0.5px solid #ccc;border-radius:8px;font-size:15px;cursor:pointer;background:#fff;color:#1a1a18;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.7}
.btn-primary{background:#1a1a18;color:#fff;border-color:#1a1a18}
.btn-sm{padding:6px 12px;font-size:13px}
.sub-section{border:0.5px solid #e0ded8;border-radius:8px;padding:12px;margin-top:14px;background:#f9f8f5}
.sub-title{font-size:12px;font-weight:600;margin-bottom:8px;color:#666}
.pour-row{display:grid;grid-template-columns:64px 1fr 1fr 28px;gap:8px;align-items:center;margin-bottom:8px}
.pour-label{font-size:13px;color:#666}
.pour-del{background:none;border:none;cursor:pointer;color:#bbb;font-size:18px;padding:0}
.tag{display:inline-block;font-size:12px;padding:3px 9px;border-radius:99px;margin-right:4px;margin-bottom:4px}
.tag-method{background:#FAEEDA;color:#854F0B}
.tag-origin{background:#E1F5EE;color:#0F6E56}
.tag-roast{background:#EEEDFE;color:#3C3489}
.tag-milk{background:#E6F1FB;color:#185FA5}
.age-pill{display:inline-block;font-size:12px;padding:2px 10px;border-radius:99px;margin-left:6px}
.age-early{background:#FAEEDA;color:#854F0B}
.age-peak{background:#E1F5EE;color:#0F6E56}
.age-late{background:#FCEBEB;color:#A32D2D}
.score{font-size:18px;font-weight:600;color:#BA7517}
.entry-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.entry-title{font-size:15px;font-weight:600}
.entry-date{font-size:12px;color:#aaa;margin-top:2px}
.del-btn{font-size:12px;color:#bbb;cursor:pointer;border:none;background:none;padding:4px 6px}
.pour-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;margin-top:8px}
.pour-item{background:#f5f3ef;border-radius:8px;padding:6px 8px;font-size:12px}
.pour-item-lbl{color:#888;font-size:11px;margin-bottom:2px}
.insight-stat{background:#f5f3ef;border-radius:8px;padding:12px}
.insight-lbl{font-size:12px;color:#888;margin-bottom:4px}
.insight-val{font-size:20px;font-weight:600}
.insight-sub{font-size:12px;color:#888;margin-top:2px}
.bar-wrap{margin:8px 0}
.bar-lbl{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.bar-bg{height:8px;background:#ece9e3;border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;background:#BA7517;transition:width .4s}
.empty{text-align:center;padding:2.5rem 1rem;color:#aaa;font-size:14px;line-height:1.7}
.bean-select-info{background:#f5f3ef;border-radius:8px;padding:10px 12px;margin-top:8px;font-size:13px;color:#666;display:none}
.divider{border:none;border-top:0.5px solid #ece9e3;margin:16px 0}
.section-heading{font-size:14px;font-weight:600;margin-bottom:12px}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">☕</div>
  <div>
    <div class="header-title">Coffee Journal</div>
    <div class="header-sub">自分だけのコーヒー記録帳</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('record')">記録する</button>
  <button class="tab" onclick="showTab('beans')">豆マスタ</button>
  <button class="tab" onclick="showTab('history')">履歴</button>
  <button class="tab" onclick="showTab('insights')">傾向・示唆</button>
</div>

<!-- 記録する -->
<div id="record" class="section active">
  <div class="card">
    <div class="row2">
      <div>
        <label>種類</label>
        <select id="f-type" onchange="onTypeChange()">
          <option>ドリップコーヒー</option>
          <option>カフェラテ</option>
          <option>カプチーノ</option>
          <option>エスプレッソ</option>
          <option>アイスコーヒー</option>
          <option>その他</option>
        </select>
      </div>
      <div>
        <label>抽出方法</label>
        <select id="f-method">
          <option>ハンドドリップ</option>
          <option>エスプレッソマシン</option>
          <option>フレンチプレス</option>
          <option>エアロプレス</option>
          <option>モカポット</option>
          <option>カプセル</option>
          <option>その他</option>
        </select>
      </div>
    </div>

    <div>
      <label>使用する豆</label>
      <select id="f-bean" onchange="onBeanSelect()">
        <option value="">— 豆を選択（または手入力）—</option>
      </select>
      <div id="bean-info" class="bean-select-info"></div>
    </div>

    <div class="row2" style="margin-top:0">
      <div>
        <label>豆の産地</label>
        <input id="f-origin" type="text" placeholder="例: エチオピア">
      </div>
      <div>
        <label>焙煎度</label>
        <select id="f-roast">
          <option>ライト</option>
          <option>ミディアム</option>
          <option>ミディアムダーク</option>
          <option>ダーク</option>
          <option>不明</option>
        </select>
      </div>
    </div>

    <div class="row2">
      <div>
        <label>豆の量</label>
        <div class="unit-wrap"><input id="f-dose" type="number" inputmode="decimal" placeholder="15"><span class="unit">g</span></div>
      </div>
      <div>
        <label>湯温</label>
        <div class="unit-wrap"><input id="f-temp" type="number" inputmode="decimal" placeholder="92"><span class="unit">°C</span></div>
      </div>
    </div>

    <div id="pour-section" class="sub-section">
      <div class="sub-title" style="color:#0F6E56">お湯の投入記録</div>
      <div id="pour-rows"></div>
      <div style="display:flex;gap:8px;margin-top:4px;align-items:center">
        <button class="btn btn-sm" onclick="addPour()">＋ 投入を追加</button>
        <span id="pour-total" style="font-size:12px;color:#888"></span>
      </div>
    </div>

    <div id="milk-section" class="sub-section" style="display:none;border-color:#B5D4F4">
      <div class="sub-title" style="color:#185FA5">ミルク情報</div>
      <div class="row2">
        <div>
          <label>ミルクの量</label>
          <div class="unit-wrap"><input id="f-milk" type="number" inputmode="decimal" placeholder="150"><span class="unit">ml</span></div>
        </div>
        <div>
          <label>フォーム時間</label>
          <div class="unit-wrap"><input id="f-foam" type="number" inputmode="decimal" placeholder="30"><span class="unit">秒</span></div>
        </div>
      </div>
    </div>

    <hr class="divider">

    <div>
      <label>総合評価</label>
      <div class="stars" id="stars">
        <span class="star" data-v="1">★</span><span class="star" data-v="2">★</span>
        <span class="star" data-v="3">★</span><span class="star" data-v="4">★</span>
        <span class="star" data-v="5">★</span>
      </div>
    </div>
    <div class="row2">
      <div><label>酸味</label><select id="f-acidity"><option>弱い</option><option>普通</option><option>強い</option></select></div>
      <div><label>苦味</label><select id="f-bitter"><option>弱い</option><option>普通</option><option>強い</option></select></div>
    </div>
    <div>
      <label>メモ（香り・後味など）</label>
      <textarea id="f-note" placeholder="例: チョコレートのような甘い香り、後味がすっきり..."></textarea>
    </div>
    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn btn-primary" onclick="saveEntry()">記録を保存</button>
      <button class="btn" onclick="clearRecordForm()">クリア</button>
    </div>
  </div>
</div>

<!-- 豆マスタ -->
<div id="beans" class="section">
  <div class="card">
    <div class="section-heading">新しい豆を登録</div>
    <div class="row2">
      <div>
        <label>豆の名前 <span style="color:#e24b4a">*</span></label>
        <input id="b-name" type="text" placeholder="例: エチオピア イルガチェフェ">
      </div>
      <div>
        <label>焙煎日 <span style="color:#e24b4a">*</span></label>
        <input id="b-roastdate" type="date">
      </div>
    </div>
    <div class="row2">
      <div>
        <label>産地</label>
        <input id="b-origin" type="text" placeholder="例: エチオピア">
      </div>
      <div>
        <label>焙煎度</label>
        <select id="b-roast">
          <option>ライト</option><option>ミディアム</option>
          <option>ミディアムダーク</option><option>ダーク</option><option>不明</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div>
        <label>品種（任意）</label>
        <input id="b-variety" type="text" placeholder="例: ゲイシャ">
      </div>
      <div>
        <label>購入ショップ（任意）</label>
        <input id="b-shop" type="text" placeholder="例: ○○コーヒー">
      </div>
    </div>
    <div>
      <label>メモ（任意）</label>
      <input id="b-note" type="text" placeholder="例: フルーティで華やかな香り">
    </div>
    <div style="margin-top:16px">
      <button class="btn btn-primary" onclick="saveBean()">豆を登録</button>
    </div>
  </div>
  <div id="bean-list"></div>
</div>

<!-- 履歴 -->
<div id="history" class="section">
  <div id="history-list"></div>
</div>

<!-- 示唆 -->
<div id="insights" class="section">
  <div id="insights-content"></div>
</div>

<script>
const MILK_TYPES=['カフェラテ','カプチーノ'];
const POUR_LABELS=['蒸らし','1回目','2回目','3回目','4回目','5回目','6回目'];
let rating=0,pours=[{water:'',time:''}];

function getBeans(){try{return JSON.parse(localStorage.getItem('coffee_beans')||'[]')}catch{return[]}}
function saveBeans(a){localStorage.setItem('coffee_beans',JSON.stringify(a))}
function getLogs(){try{return JSON.parse(localStorage.getItem('coffee_entries')||'[]')}catch{return[]}}
function saveLogs(a){localStorage.setItem('coffee_entries',JSON.stringify(a))}

function daysFromRoast(d){if(!d)return null;return Math.floor((Date.now()-new Date(d).getTime())/86400000)}
function agePill(days){
  if(days===null)return '';
  if(days<7)return`<span class="age-pill age-early">焙煎${days}日目・ガス抜き中</span>`;
  if(days<=30)return`<span class="age-pill age-peak">焙煎${days}日目・ピーク</span>`;
  return`<span class="age-pill age-late">焙煎${days}日目・注意</span>`;
}

function showTab(t){
  ['record','beans','history','insights'].forEach((s,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',s===t);
    document.getElementById(s).classList.toggle('active',s===t);
  });
  if(t==='beans')renderBeanList();
  if(t==='history')renderHistory();
  if(t==='insights')renderInsights();
}

function populateBeanSelect(){
  const sel=document.getElementById('f-bean');
  const beans=getBeans();
  sel.innerHTML='<option value="">— 豆を選択（または手入力）—</option>';
  beans.forEach(b=>{
    const days=daysFromRoast(b.roastDate);
    sel.innerHTML+=`<option value="${b.id}">${b.name}${days!==null?` (焙煎${days}日目)`:''}</option>`;
  });
}

function onBeanSelect(){
  const id=document.getElementById('f-bean').value;
  const info=document.getElementById('bean-info');
  if(!id){info.style.display='none';return;}
  const bean=getBeans().find(b=>b.id==id);
  if(!bean)return;
  if(bean.origin)document.getElementById('f-origin').value=bean.origin;
  if(bean.roast)document.getElementById('f-roast').value=bean.roast;
  const days=daysFromRoast(bean.roastDate);
  let html=`<strong>${bean.name}</strong>`;
  if(bean.origin)html+=` · ${bean.origin}`;
  if(bean.variety)html+=` · 品種: ${bean.variety}`;
  if(bean.shop)html+=` · ${bean.shop}`;
  if(days!==null)html+=agePill(days);
  if(bean.note)html+=`<br><span style="color:#aaa">${bean.note}</span>`;
  info.innerHTML=html;info.style.display='block';
}

function onTypeChange(){
  const t=document.getElementById('f-type').value;
  document.getElementById('pour-section').style.display=t==='ドリップコーヒー'?'block':'none';
  document.getElementById('milk-section').style.display=MILK_TYPES.includes(t)?'block':'none';
}

function initPours(){pours=[{water:'',time:''}];renderPours();}
function addPour(){if(pours.length>=7)return;pours.push({water:'',time:''});renderPours();}
function removePour(i){if(i===0)return;pours.splice(i,1);renderPours();}
function renderPours(){
  document.getElementById('pour-rows').innerHTML=pours.map((p,i)=>`
    <div class="pour-row">
      <span class="pour-label">${POUR_LABELS[i]}</span>
      <div class="unit-wrap"><input type="number" inputmode="decimal" placeholder="量" value="${p.water}" oninput="pours[${i}].water=this.value;updatePourTotal()" style="padding-right:32px"><span class="unit">ml</span></div>
      <div class="unit-wrap"><input type="number" inputmode="decimal" placeholder="時間" value="${p.time}" oninput="pours[${i}].time=this.value" style="padding-right:32px"><span class="unit">秒</span></div>
      ${i>0?`<button class="pour-del" onclick="removePour(${i})">×</button>`:'<span></span>'}
    </div>`).join('');
  updatePourTotal();
}
function updatePourTotal(){
  const t=pours.reduce((s,p)=>s+(parseFloat(p.water)||0),0);
  document.getElementById('pour-total').textContent=t>0?`合計 ${t} ml`:'';
}

document.querySelectorAll('.star').forEach(s=>{
  s.addEventListener('click',()=>{rating=+s.dataset.v;hlStars(rating);});
});
function hlStars(n){document.querySelectorAll('.star').forEach(s=>s.classList.toggle('on',+s.dataset.v<=n));}

function saveEntry(){
  const type=document.getElementById('f-type').value;
  const isDrip=type==='ドリップコーヒー';
  const isMilk=MILK_TYPES.includes(type);
  const beanId=document.getElementById('f-bean').value||null;
  const bean=beanId?getBeans().find(b=>b.id==beanId):null;
  const days=bean?daysFromRoast(bean.roastDate):null;
  const entry={
    id:Date.now(),
    date:new Date().toLocaleDateString('ja-JP'),
    type,method:document.getElementById('f-method').value,
    beanId,beanName:bean?bean.name:'',
    origin:document.getElementById('f-origin').value.trim()||(bean?bean.origin:'')||'不明',
    roast:document.getElementById('f-roast').value,
    roastDate:bean?bean.roastDate:'',daysFromRoast:days,
    dose:document.getElementById('f-dose').value,temp:document.getElementById('f-temp').value,
    pours:isDrip?pours.filter(p=>p.water||p.time).map((p,i)=>({label:POUR_LABELS[i],water:p.water,time:p.time})):[],
    milk:isMilk?document.getElementById('f-milk').value:'',
    foam:isMilk?document.getElementById('f-foam').value:'',
    rating,acidity:document.getElementById('f-acidity').value,bitter:document.getElementById('f-bitter').value,
    note:document.getElementById('f-note').value.trim()
  };
  if(!rating){alert('評価（★）を選んでください');return;}
  const arr=getLogs();arr.unshift(entry);saveLogs(arr);
  clearRecordForm();
  const btn=document.querySelector('#record .btn-primary');
  btn.textContent='保存しました！';btn.disabled=true;
  setTimeout(()=>{btn.textContent='記録を保存';btn.disabled=false;},1500);
}

function clearRecordForm(){
  ['f-dose','f-temp','f-note','f-origin','f-milk','f-foam'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('f-bean').value='';
  document.getElementById('bean-info').style.display='none';
  document.getElementById('f-type').value='ドリップコーヒー';
  document.getElementById('milk-section').style.display='none';
  document.getElementById('pour-section').style.display='block';
  rating=0;hlStars(0);initPours();
}

function saveBean(){
  const name=document.getElementById('b-name').value.trim();
  const roastDate=document.getElementById('b-roastdate').value;
  if(!name){alert('豆の名前を入力してください');return;}
  if(!roastDate){alert('焙煎日を入力してください');return;}
  const bean={id:Date.now(),name,roastDate,
    origin:document.getElementById('b-origin').value.trim(),
    roast:document.getElementById('b-roast').value,
    variety:document.getElementById('b-variety').value.trim(),
    shop:document.getElementById('b-shop').value.trim(),
    note:document.getElementById('b-note').value.trim()};
  const arr=getBeans();arr.unshift(bean);saveBeans(arr);
  ['b-name','b-roastdate','b-origin','b-variety','b-shop','b-note'].forEach(id=>document.getElementById(id).value='');
  renderBeanList();populateBeanSelect();
  const btn=document.querySelector('#beans .btn-primary');
  btn.textContent='登録しました！';btn.disabled=true;
  setTimeout(()=>{btn.textContent='豆を登録';btn.disabled=false;},1500);
}

function deleteBean(id){
  if(!confirm('この豆を削除しますか？'))return;
  saveBeans(getBeans().filter(b=>b.id!==id));
  renderBeanList();populateBeanSelect();
}

function renderBeanList(){
  const beans=getBeans();
  const el=document.getElementById('bean-list');
  if(!beans.length){el.innerHTML='<div class="empty">まだ豆が登録されていません。</div>';return;}
  el.innerHTML=beans.map(b=>{
    const days=daysFromRoast(b.roastDate);
    return`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1">
          <div style="font-size:15px;font-weight:600;margin-bottom:4px">${b.name}${agePill(days)}</div>
          <div style="font-size:13px;color:#666">${b.origin?b.origin+' · ':''}${b.roast}${b.variety?' · 品種: '+b.variety:''}${b.shop?' · '+b.shop:''}</div>
          ${b.roastDate?`<div style="font-size:12px;color:#aaa;margin-top:2px">焙煎日: ${b.roastDate}</div>`:''}
          ${b.note?`<div style="font-size:12px;color:#aaa;margin-top:2px">${b.note}</div>`:''}
        </div>
        <button class="del-btn" onclick="deleteBean(${b.id})">削除</button>
      </div>
    </div>`;
  }).join('');
}

function renderHistory(){
  const arr=getLogs();
  const el=document.getElementById('history-list');
  if(!arr.length){el.innerHTML='<div class="empty">まだ記録がありません。<br>最初の一杯を記録してみましょう！</div>';return;}
  el.innerHTML=arr.map(e=>{
    const ageTag=e.daysFromRoast!=null
      ?(e.daysFromRoast<7?`<span class="tag" style="background:#FAEEDA;color:#854F0B">焙煎${e.daysFromRoast}日目</span>`
        :e.daysFromRoast<=30?`<span class="tag" style="background:#E1F5EE;color:#0F6E56">焙煎${e.daysFromRoast}日目</span>`
        :`<span class="tag" style="background:#FCEBEB;color:#A32D2D">焙煎${e.daysFromRoast}日目</span>`):'';
    const pourHtml=e.pours&&e.pours.length?`
      <div style="margin-top:8px;padding-top:8px;border-top:0.5px solid #ece9e3">
        <div style="font-size:11px;color:#888;margin-bottom:6px;font-weight:600">お湯の投入</div>
        <div class="pour-summary">
          ${e.pours.map(p=>`<div class="pour-item"><div class="pour-item-lbl">${p.label}</div><div>${p.water?p.water+'ml':'—'}${p.time?' / '+p.time+'秒':''}</div></div>`).join('')}
          <div class="pour-item"><div class="pour-item-lbl">合計</div><div>${e.pours.reduce((s,p)=>s+(parseFloat(p.water)||0),0)}ml</div></div>
        </div>
      </div>`:'';
    return`<div class="card">
      <div class="entry-header">
        <div>
          <div class="entry-title">${e.type}${e.beanName?` <span style="font-weight:400;font-size:13px;color:#888">· ${e.beanName}</span>`:''}</div>
          <div class="entry-date">${e.date}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="score">${'★'.repeat(e.rating)}</span>
          <button class="del-btn" onclick="deleteLog(${e.id})">削除</button>
        </div>
      </div>
      <div>
        <span class="tag tag-method">${e.method}</span>
        <span class="tag tag-origin">${e.origin}</span>
        <span class="tag tag-roast">焙煎: ${e.roast}</span>
        ${ageTag}
        ${e.milk?`<span class="tag tag-milk">ミルク ${e.milk}ml</span>`:''}
        ${e.foam?`<span class="tag tag-milk">フォーム ${e.foam}秒</span>`:''}
      </div>
      <div style="font-size:13px;color:#666;margin-top:6px;display:grid;grid-template-columns:1fr 1fr;gap:3px">
        ${e.dose?`<span>豆: ${e.dose}g</span>`:''}${e.temp?`<span>湯温: ${e.temp}°C</span>`:''}
        <span>酸味: ${e.acidity}</span><span>苦味: ${e.bitter}</span>
      </div>
      ${pourHtml}
      ${e.note?`<div style="font-size:13px;margin-top:8px;padding-top:8px;border-top:0.5px solid #ece9e3;color:#666">${e.note}</div>`:''}
    </div>`;
  }).join('');
}

function deleteLog(id){
  if(!confirm('この記録を削除しますか？'))return;
  saveLogs(getLogs().filter(e=>e.id!==id));renderHistory();
}

function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0;}

function renderInsights(){
  const arr=getLogs();
  const el=document.getElementById('insights-content');
  if(arr.length<2){el.innerHTML='<div class="empty">示唆を出すには2件以上の記録が必要です。<br>もう少し記録してみましょう！</div>';return;}
  const byMethod={},byOrigin={},byRoast={},byAge=[];
  arr.forEach(e=>{
    (byMethod[e.method]=byMethod[e.method]||[]).push(e.rating);
    if(e.origin!=='不明')(byOrigin[e.origin]=byOrigin[e.origin]||[]).push(e.rating);
    (byRoast[e.roast]=byRoast[e.roast]||[]).push(e.rating);
    if(e.daysFromRoast!=null)byAge.push({days:e.daysFromRoast,rating:e.rating});
  });
  const topMethod=Object.entries(byMethod).sort((a,b)=>avg(b[1])-avg(a[1]))[0];
  const topOrigin=Object.entries(byOrigin).sort((a,b)=>avg(b[1])-avg(a[1]))[0];
  const totalAvg=avg(arr.map(e=>e.rating));
  function barChart(obj,title){
    const entries=Object.entries(obj).map(([k,v])=>({k,a:avg(v),n:v.length})).sort((a,b)=>b.a-a.a);
    const max=Math.max(...entries.map(e=>e.a));
    return`<div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:12px">${title}</div>
      ${entries.map(e=>`<div class="bar-wrap">
        <div class="bar-lbl"><span>${e.k} <span style="color:#aaa;font-size:12px">(${e.n}件)</span></span><span style="font-weight:600">${e.a.toFixed(1)}★</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${max>0?(e.a/max*100).toFixed(0):0}%"></div></div>
      </div>`).join('')}</div>`;
  }
  let ageChart='';
  if(byAge.length>=2){
    const groups=[
      {k:'7日未満（ガス抜き中）',v:byAge.filter(x=>x.days<7).map(x=>x.rating)},
      {k:'7〜30日（ピーク期）',v:byAge.filter(x=>x.days>=7&&x.days<=30).map(x=>x.rating)},
      {k:'30日以降（劣化注意）',v:byAge.filter(x=>x.days>30).map(x=>x.rating)}
    ].filter(d=>d.v.length>0);
    if(groups.length>=2){
      const max=Math.max(...groups.map(d=>avg(d.v)));
      ageChart=`<div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:12px">焙煎経過日数 vs 評価</div>
        ${groups.map(d=>`<div class="bar-wrap">
          <div class="bar-lbl"><span style="font-size:13px">${d.k} <span style="color:#aaa;font-size:12px">(${d.v.length}件)</span></span><span style="font-weight:600">${avg(d.v).toFixed(1)}★</span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:${max>0?(avg(d.v)/max*100).toFixed(0):0}%"></div></div>
        </div>`).join('')}</div>`;
    }
  }
  el.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div class="insight-stat"><div class="insight-lbl">平均評価</div><div class="insight-val">${totalAvg.toFixed(1)}★</div><div class="insight-sub">${arr.length}件の記録</div></div>
      ${topMethod?`<div class="insight-stat"><div class="insight-lbl">ベスト抽出法</div><div class="insight-val" style="font-size:15px">${topMethod[0]}</div><div class="insight-sub">平均 ${avg(topMethod[1]).toFixed(1)}★</div></div>`:''}
      ${topOrigin?`<div class="insight-stat"><div class="insight-lbl">ベスト産地</div><div class="insight-val" style="font-size:15px">${topOrigin[0]}</div><div class="insight-sub">平均 ${avg(topOrigin[1]).toFixed(1)}★</div></div>`:''}
    </div>
    ${ageChart}
    ${barChart(byMethod,'抽出方法別 平均評価')}
    ${Object.keys(byOrigin).length>0?barChart(byOrigin,'産地別 平均評価'):''}
    ${barChart(byRoast,'焙煎度別 平均評価')}`;
}

populateBeanSelect();
initPours();
</script>
</body>
</html>
